name: Refrescar datos y publicar tablero

# Refresco programado: cuando OECE / PERÚ COMPRAS publican nuevos datos abiertos,
# el pipeline regenera docs/data.json y GitHub Pages se actualiza solo.
on:
  schedule:
    - cron: "0 11 * * 1"   # lunes 06:00 Perú (UTC-5)
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Instalar dependencias
        run: pip install -r requirements.txt
      - name: Ejecutar pipeline (intenta fuente real, cae a muestra)
        run: python -m src.run_pipeline --refresh
      - name: Commit de los datos actualizados
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add docs/data.json templates/ || true
          git commit -m "chore: refresco automático [skip ci]" || echo "Sin cambios"
          git push || echo "Nada que publicar"
